# Upstream Sync
# This repository is a downstream accelerator of jonathan-vella/azure-agentic-infraops.
# Upstream ALWAYS wins for all files EXCEPT the three paths listed in EXCLUDE_PATHS below.
#
# ALWAYS synced from upstream (upstream wins):
#   .devcontainer/          .vscode/               .github/agents/
#   .github/skills/         .github/instructions/  .github/prompts/
#   .github/data/           .github/workflows/*    .github/copilot-instructions.md
#   .github/CODEOWNERS      .github/ISSUE_TEMPLATE/ .github/PULL_REQUEST_TEMPLATE.md
#   docs/                   scripts/               mcp/azure-pricing-mcp/
#   package.json            lefthook.yml           commitlint.config.js
#   *.md (root)             *.json/.yml/.toml/.txt (root config files)
#
# NEVER synced (accelerator-specific, excluded):
#   agent-output/           → user-generated project outputs
#   infra/bicep/            → user project Bicep templates
#   .github/workflows/weekly-upstream-sync.yml  → this file itself
#
# Runs weekly and on manual dispatch. Always opens a PR for human review — no auto-merge.

name: Upstream Sync

"on":
  schedule:
    # Run weekly on Sunday at 23:00 UTC
    - cron: "0 23 * * 0"
  workflow_dispatch:
    inputs:
      force_sync:
        description: "Run sync even if no changes are detected"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UPSTREAM_REPO: jonathan-vella/azure-agentic-infraops
  UPSTREAM_REF: main
  SYNC_BRANCH: automation/upstream-sync
  # Only these three paths are excluded — everything else syncs from upstream.
  EXCLUDE_PATHS: |
    .git
    .github/workflows/weekly-upstream-sync.yml
    agent-output/
    infra/bicep/
    node_modules/

jobs:
  sync:
    name: Sync Upstream Content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream branch
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "${UPSTREAM_REF}" --prune

      - name: Apply upstream changes with conflict detection
        id: sync
        shell: bash
        run: |
          set -euo pipefail

          conflict=false
          changed=false

          set +e
          git merge --squash --no-commit "upstream/${UPSTREAM_REF}"
          merge_exit=$?
          set -e

          if [ "$merge_exit" -ne 0 ]; then
            conflict=true
            mkdir -p .github/sync
            conflicted_files="$(git diff --name-only --diff-filter=U || true)"
            git merge --abort || true

            {
              echo "## Weekly Upstream Sync Conflict Report"
              echo
              echo "Upstream: \\`${UPSTREAM_REPO}@${UPSTREAM_REF}\\`"
              echo "Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
              echo
              echo "The automated sync detected merge conflicts and stopped before applying changes."
              echo "A manual review PR is created to resolve these conflicts safely."
              echo
              echo "### Conflicted Files"
              echo
              if [ -n "$conflicted_files" ]; then
                echo "$conflicted_files" | sed 's/^/- /'
              else
                echo "- Conflict detected, but no file list could be determined."
              fi
              echo
              echo "### Next Steps"
              echo
              echo "1. Open the PR generated by this workflow."
              echo "2. Merge upstream changes manually for listed files."
              echo "3. Validate and merge the PR after review."
            } > .github/sync/weekly-upstream-conflicts.md

            git add .github/sync/weekly-upstream-conflicts.md
          else
            while IFS= read -r path; do
              [ -z "$path" ] && continue
              git restore --source=HEAD --staged --worktree -- "$path" 2>/dev/null || true
            done <<< "${EXCLUDE_PATHS}"
          fi

          if ! git diff --quiet || ! git diff --cached --quiet; then
            changed=true
          fi

          echo "conflict=$conflict" >> "$GITHUB_OUTPUT"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Log synced script files
        if: steps.sync.outputs.changed == 'true'
        run: |
          echo "📁 scripts/ changes included in this sync:"
          git diff --cached --name-only -- 'scripts/' | sed 's/^/  /' || echo "  (no script changes)"

      - name: Skip when no changes are present
        if: steps.sync.outputs.changed != 'true' && github.event.inputs.force_sync != 'true'
        run: |
          echo "No upstream changes after applying exclusions."

      - name: Ensure PR labels exist
        if: steps.sync.outputs.changed == 'true' || github.event.inputs.force_sync == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "automation" --color "0075ca" --description "Automated workflow changes" --repo "${{ github.repository }}" 2>/dev/null || true
          gh label create "upstream-sync" --color "e4e669" --description "Upstream template sync" --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Create pull request for upstream sync
        if: steps.sync.outputs.changed == 'true' || github.event.inputs.force_sync == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(sync): weekly upstream sync from ${{ env.UPSTREAM_REPO }}"
          branch: ${{ env.SYNC_BRANCH }}
          base: ${{ github.ref_name }}
          delete-branch: true
          title: "chore(sync): weekly upstream sync from ${{ env.UPSTREAM_REPO }}"
          body: |
            Automated full sync from `${{ env.UPSTREAM_REPO }}@${{ env.UPSTREAM_REF }}`. **Upstream always wins.**

            - Conflict detected: `${{ steps.sync.outputs.conflict }}`
            - Triggered by: `${{ github.event_name }}`

            **Synced from upstream (upstream wins everything):**
            `.devcontainer/` · `.vscode/` · `.github/agents/` · `.github/skills/` · `.github/instructions/`
            `.github/prompts/` · `.github/data/` · `.github/workflows/*` · `.github/copilot-instructions.md`
            `.github/CODEOWNERS` · `.github/ISSUE_TEMPLATE/` · `.github/PULL_REQUEST_TEMPLATE.md`
            `docs/` · `scripts/` · `mcp/azure-pricing-mcp/` · all root config files

            **Excluded (accelerator-specific, never overwritten):**
            `agent-output/` · `infra/bicep/` · `.github/workflows/weekly-upstream-sync.yml`

            > Policy: always manual review, no auto-merge.
          labels: |
            automation
            upstream-sync
